<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solicitação de Compra — PERPEC Oilfield Supply</title>
<style>
/* ═══════════════════════════════════════
   PERPEC — Formulário de Solicitação de Compra
   Edite WEBHOOK_URL na seção CONFIG abaixo
   ═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red2:#961c13;--dark:#1A1210;--mid:#3D2B27;
  --bg:#F5F3F0;--surface:#FFFFFF;--surface2:#F9F8F6;
  --border:#E0DBD5;--border2:#C5BDB5;
  --text:#1A1210;--muted:#7A6F6A;
  --accent:#C0392B;--accent-lt:#FDF0EF;
  --success:#155724;--success-lt:#D4EDDA;
  --warn:#856404;--warn-lt:#FFF3CD;
  --radius:8px;--radius-lg:12px;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent)}

/* ── Header ── */
.site-header{background:var(--dark);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem}
.header-logo img{height:36px;display:block}
.header-meta{font-size:11px;color:#9A8A85;letter-spacing:.05em;text-align:right;line-height:1.4}
.header-meta strong{color:#D4C8C4;font-size:12px}

/* ── Doc banner ── */
.doc-banner{background:var(--dark);border-top:1px solid #2E1F1B;padding:.6rem 1.5rem}
.doc-banner-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.doc-code{font-family:'Courier New',monospace;font-size:13px;font-weight:700;color:#E8D5D0;letter-spacing:.08em}
.doc-rev{font-size:11px;color:#9A8A85}
.doc-req{font-size:11px;color:#B08080}

/* ── Wrap ── */
.wrap{max-width:900px;margin:0 auto;padding:2rem 1rem 4rem}

/* ── Section card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.2rem;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-head{background:var(--dark);padding:.7rem 1.3rem;display:flex;align-items:center;gap:8px}
.card-head h2{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#D4C8C4}
.card-head svg{width:14px;height:14px;stroke:#C0392B;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card-body{padding:1.3rem}

/* ── Grid ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.full{grid-column:1/-1}
@media(max-width:580px){.g2,.g3{grid-template-columns:1fr}.full{grid-column:1}}

/* ── Fields ── */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.req{color:var(--red);margin-left:2px}
.field input,.field select,.field textarea{
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:9px 11px;font-size:14px;font-family:inherit;
  color:var(--text);background:var(--surface);
  transition:border-color .14s,box-shadow .14s;width:100%
}
.field input:hover,.field select:hover,.field textarea:hover{border-color:#9A9087}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.field input.err,.field select.err,.field textarea.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field input[type="number"]{-moz-appearance:textfield}
.field input[type="number"]::-webkit-outer-spin-button,
.field input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.field input[readonly]{background:var(--surface2);color:var(--muted);cursor:default;border-style:dashed}

/* ── Searchable dropdown ── */
.dd-wrap{position:relative}
.dd-input{cursor:pointer}
.dd-list{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);
  max-height:220px;overflow-y:auto;z-index:200;display:none
}
.dd-list.open{display:block}
.dd-search{padding:8px;border-bottom:1px solid var(--border)}
.dd-search input{width:100%;border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font-size:13px;font-family:inherit}
.dd-search input:focus{outline:none;border-color:var(--red)}
.dd-option{padding:9px 12px;font-size:13.5px;cursor:pointer;transition:background .1s}
.dd-option:hover,.dd-option.active{background:var(--accent-lt);color:var(--red)}
.dd-empty{padding:9px 12px;font-size:13px;color:var(--muted);font-style:italic}

/* ── Item cards ── */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;animation:slideIn .2s ease;box-shadow:0 1px 2px rgba(0,0,0,.05)}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.item-head{background:#1A1210;display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem}
.item-badge{font-size:10.5px;font-weight:700;letter-spacing:.08em;background:rgba(192,57,43,.18);color:#E08070;border-radius:20px;padding:3px 10px}
.btn-remove{width:26px;height:26px;border-radius:6px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9A8A85;font-size:18px;line-height:1;transition:background .13s,color .13s}
.btn-remove:hover{background:rgba(192,57,43,.2);color:var(--red)}
.item-body{padding:1.2rem 1.3rem;display:flex;flex-direction:column;gap:13px}
.item-foot{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1.3rem;border-top:1px solid var(--border);background:var(--surface2);font-size:12.5px}
.item-foot span:first-child{color:var(--muted)}
.item-total-val{font-size:14.5px;font-weight:700;color:var(--dark)}

/* ── Urgency pills ── */
.pill-group{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .13s;user-select:none}
.pill:hover{border-color:#9A9087;color:var(--text)}
.pill.p-normal{background:#EEF2FF;border-color:#6B82CF;color:#3D5AC0}
.pill.p-alta{background:var(--warn-lt);border-color:#D4A017;color:var(--warn)}
.pill.p-urgente{background:var(--accent-lt);border-color:var(--red);color:var(--red)}

/* ── Filial pills ── */
.filial-group{display:flex;gap:7px;flex-wrap:wrap}
.filial-pill{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .13s;user-select:none}
.filial-pill:hover{border-color:#9A9087;color:var(--text)}
.filial-pill.active{background:var(--dark);border-color:var(--dark);color:#fff}

/* ── Add item btn ── */
.btn-add{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;border:1.5px dashed var(--border2);background:none;border-radius:var(--radius-lg);padding:12px;font-size:13.5px;font-family:inherit;cursor:pointer;color:var(--red);font-weight:600;transition:background .13s,border-color .13s;margin-bottom:1.2rem}
.btn-add:hover{background:var(--accent-lt);border-color:var(--red)}

/* ── Grand total ── */
.grand-total{background:var(--dark);border-radius:var(--radius-lg);padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem}
.gt-label{font-size:12px;color:#9A8A85;font-weight:500}
.gt-value{font-size:22px;font-weight:700;color:#E8D5D0;letter-spacing:-.3px;font-variant-numeric:tabular-nums}

/* ── Submit ── */
.btn-submit{width:100%;padding:14px;border:none;border-radius:var(--radius-lg);background:var(--red);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.02em;transition:background .15s,transform .1s}
.btn-submit:hover:not(:disabled){background:var(--red2)}
.btn-submit:active:not(:disabled){transform:scale(.99)}
.btn-submit:disabled{background:var(--border2);cursor:not-allowed;color:var(--muted)}

/* ── Empty state ── */
.empty-state{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:13px;border:1.5px dashed var(--border2);border-radius:var(--radius-lg);margin-bottom:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;border-radius:var(--radius-lg);padding:12px 20px;font-size:13.5px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--red)}

/* ── Loader ── */
.loader{display:none;text-align:center;padding:1rem;color:var(--muted);font-size:13px}
</style>
</head>

const DADOS_URL   = "dados.json";  // Caminho relativo para o arquivo de dados
// ═══════════════════════════════════════════════

let dadosApp = { setores: [], centros_custo: [], itens_catalogo: [] };
let itemCount = 0;
const itemsState = {};
let scCounter = 0;

// ── Inicialização ────────────────────────────
async function init() {
  setDocDate();
  await loadDados();
  await loadCounter();
  renderDocCode();
  buildDropdown("dd-setor", "setor-display", "setor", "dd-setor-list", "dd-setor-search", "dd-setor-options", dadosApp.setores);
  buildDropdown("dd-cc", "cc-display", "centroCusto", "dd-cc-list", "dd-cc-search", "dd-cc-options", dadosApp.centros_custo);
}

function setDocDate() {
  const now = new Date();
  document.getElementById("docDate").textContent = now.toLocaleDateString("pt-BR");
}

async function loadDados() {
  try {
    const r = await fetch(DADOS_URL + "?v=" + Date.now());
    if (r.ok) dadosApp = await r.json();
  } catch(e) { console.warn("dados.json não encontrado, usando listas padrão"); }
}

// ── Contador de SC (localStorage para evitar duplicatas na mesma máquina) ──
async function loadCounter() {
  // Usa localStorage como base local + timestamp para evitar colisão
  const stored = localStorage.getItem("perpec_sc_last");
  const now = new Date();
  const ano = String(now.getFullYear()).slice(-2);
  if (stored) {
    const { seq, year } = JSON.parse(stored);
    scCounter = (String(year) === ano) ? seq : 0;
  }
}

function renderDocCode() {
  const now = new Date();
  const ano = String(now.getFullYear()).slice(-2);
  const next = scCounter + 1;
  const code = "SC-" + String(next).padStart(3, "0") + "-" + ano;
  document.getElementById("docCode").textContent = code;
}

function getNextCode() {
  const now = new Date();
  const ano = String(now.getFullYear()).slice(-2);
  const next = scCounter + 1;
  return { code: "SC-" + String(next).padStart(3, "0") + "-" + ano, seq: next, year: ano };
}

function confirmCounter(seq, year) {
  localStorage.setItem("perpec_sc_last", JSON.stringify({ seq, year }));
  scCounter = seq;
}

// ── Dropdown pesquisável ─────────────────────
function buildDropdown(wrapId, displayId, hiddenId, listId, searchId, optionsId, items) {
  const wrap    = document.getElementById(wrapId);
  const display = document.getElementById(displayId);
  const hidden  = document.getElementById(hiddenId);
  const list    = document.getElementById(listId);
  const search  = document.getElementById(searchId);
  const opts    = document.getElementById(optionsId);

  function renderOpts(filter) {
    const q = (filter||"").toLowerCase();
    const filtered = items.filter(i => i.toLowerCase().includes(q));
    opts.innerHTML = "";
    if (!filtered.length) {
      opts.innerHTML = '<div class="dd-empty">Nenhum resultado</div>';
      return;
    }
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.className = "dd-option";
      div.textContent = item;
      div.addEventListener("click", () => {
        display.value = item;
        hidden.value  = item;
        display.classList.remove("err");
        list.classList.remove("open");
        search.value = "";
        renderOpts("");
      });
      opts.appendChild(div);
    });
  }

  renderOpts("");
  display.addEventListener("click", (e) => { e.stopPropagation(); list.classList.toggle("open"); if(list.classList.contains("open")) search.focus(); });
  search.addEventListener("input",  () => renderOpts(search.value));
  search.addEventListener("click",  (e) => e.stopPropagation());
  document.addEventListener("click", () => list.classList.remove("open"));
}

// ── Item: dropdown de catálogo ───────────────
function buildItemDropdown(id) {
  const items = dadosApp.itens_catalogo;
  const wrap    = document.getElementById("dd-item-" + id);
  const display = document.getElementById("item-display-" + id);
  const hidden  = document.getElementById("item-val-" + id);
  const list    = document.getElementById("dd-item-list-" + id);
  const search  = document.getElementById("dd-item-search-" + id);
  const opts    = document.getElementById("dd-item-opts-" + id);

  function renderOpts(filter) {
    const q = (filter||"").toLowerCase();
    const filtered = items.filter(i => i.toLowerCase().includes(q));
    opts.innerHTML = "";
    if (!filtered.length) { opts.innerHTML = '<div class="dd-empty">Nenhum resultado</div>'; return; }
    filtered.forEach(item => {
      const div = document.createElement("div");
      div.className = "dd-option";
      div.textContent = item;
      div.addEventListener("click", () => {
        display.value = item;
        hidden.value  = item;
        display.classList.remove("err");
        list.classList.remove("open");
        search.value = "";
        renderOpts("");
      });
      opts.appendChild(div);
    });
  }

  renderOpts("");
  display.addEventListener("click", (e) => { e.stopPropagation(); list.classList.toggle("open"); if(list.classList.contains("open")) search.focus(); });
  search.addEventListener("input",  () => renderOpts(search.value));
  search.addEventListener("click",  (e) => e.stopPropagation());
  document.addEventListener("click", () => list && list.classList.remove("open"));
}

// ── Filial pills ─────────────────────────────
function setFilial(id, val, el) {
  itemsState[id].filial = val;
  document.querySelectorAll("#filial-group-" + id + " .filial-pill").forEach(p => {
    p.classList.toggle("active", p === el);
  });
}

// ── Urgência pills ───────────────────────────
function setPriority(id, val, el) {
  itemsState[id].urgency = val;
  document.querySelectorAll("#pills-" + id + " .pill").forEach(p => {
    p.className = "pill";
    if (p === el) {
      if (val === "Normal")  p.classList.add("p-normal");
      if (val === "Alta")    p.classList.add("p-alta");
      if (val === "Urgente") p.classList.add("p-urgente");
    }
  });
}

// ── Adicionar item ───────────────────────────
function addItem() {
  itemCount++;
  const id = itemCount;
  itemsState[id] = { qty: 1, price: 0, urgency: "Normal", filial: "MATRIZ" };

  document.getElementById("emptyState")?.remove();

  const card = document.createElement("div");
  card.className = "item-card";
  card.id = "item-" + id;
  card.innerHTML = `
    <div class="item-head">
      <span class="item-badge">ITEM #${id}</span>
      <button class="btn-remove" onclick="removeItem(${id})" title="Remover">×</button>
    </div>
    <div class="item-body">

      <div class="g2">
        <div class="field full">
          <label>Código + Descrição do item <span class="req">*</span></label>
          <div class="dd-wrap" id="dd-item-${id}">
            <input class="dd-input" type="text" id="item-display-${id}" placeholder="Digite o código ou nome do item..." readonly />
            <input type="hidden" id="item-val-${id}" />
            <div class="dd-list" id="dd-item-list-${id}">
              <div class="dd-search"><input type="text" placeholder="Pesquisar no catálogo..." id="dd-item-search-${id}" /></div>
              <div id="dd-item-opts-${id}"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="g3">
        <div class="field">
          <label>Quantidade <span class="req">*</span></label>
          <input type="number" id="qty-${id}" value="1" min="1" oninput="calcItem(${id})" />
        </div>
        <div class="field">
          <label>Valor unitário estimado (R$)</label>
          <input type="number" id="price-${id}" placeholder="0,00" min="0" step="0.01" oninput="calcItem(${id})" />
        </div>
        <div class="field">
          <label>Data de necessidade <span class="req">*</span></label>
          <input type="date" id="datanec-${id}" />
        </div>
      </div>

      <div class="field">
        <label>Filial <span class="req">*</span></label>
        <div class="filial-group" id="filial-group-${id}">
          <span class="filial-pill active" onclick="setFilial(${id},'MATRIZ',this)">MATRIZ</span>
          <span class="filial-pill" onclick="setFilial(${id},'SERVIÇO',this)">SERVIÇO</span>
          <span class="filial-pill" onclick="setFilial(${id},'REVENDA',this)">REVENDA</span>
          <span class="filial-pill" onclick="setFilial(${id},'LOCAÇÃO',this)">LOCAÇÃO</span>
        </div>
      </div>

      <div class="field">
        <label>Justificativa da compra</label>
        <input type="text" id="justificativa-${id}" placeholder="Por que este item é necessário?" />
      </div>

      <div class="field">
        <label>Observações / Especificações</label>
        <input type="text" id="obs-${id}" placeholder="Marca preferida, cor, modelo, link de referência..." />
      </div>

      <div class="field">
        <label>Urgência</label>
        <div class="pill-group" id="pills-${id}">
          <span class="pill p-normal" onclick="setPriority(${id},'Normal',this)">Normal</span>
          <span class="pill" onclick="setPriority(${id},'Alta',this)">Alta</span>
          <span class="pill" onclick="setPriority(${id},'Urgente',this)">Urgente</span>
        </div>
      </div>

    </div>
    <div class="item-foot">
      <span>Total estimado deste item</span>
      <span class="item-total-val" id="total-${id}">R$ 0,00</span>
    </div>`;

  document.getElementById("itemsContainer").appendChild(card);
  buildItemDropdown(id);
  updateGrand();
}

function removeItem(id) {
  document.getElementById("item-" + id)?.remove();
  delete itemsState[id];
  updateGrand();
  if (!Object.keys(itemsState).length) {
    const e = document.createElement("div");
    e.className = "empty-state"; e.id = "emptyState";
    e.innerHTML = '<div style="font-size:28px;margin-bottom:6px">📦</div>Nenhum item adicionado.';
    document.getElementById("itemsContainer").prepend(e);
  }
}

function calcItem(id) {
  const qty   = parseFloat(document.getElementById("qty-" + id)?.value)   || 0;
  const price = parseFloat(document.getElementById("price-" + id)?.value) || 0;
  itemsState[id].qty   = qty;
  itemsState[id].price = price;
  const el = document.getElementById("total-" + id);
  if (el) el.textContent = fmt(qty * price);
  updateGrand();
}

function updateGrand() {
  const total = Object.values(itemsState).reduce((s, i) => s + ((i.qty||0)*(i.price||0)), 0);
  document.getElementById("grandTotal").textContent = fmt(total);
}

function fmt(n) { return "R$ " + Number(n).toLocaleString("pt-BR", {minimumFractionDigits:2,maximumFractionDigits:2}); }

// ── Validação ────────────────────────────────
function markErr(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.add("err"); el.addEventListener("input", () => el.classList.remove("err"), {once:true}); }
}

// ── Envio ────────────────────────────────────
async function submitForm() {
  if (!WEBHOOK_URL) { showToast("⚙️ URL do webhook não configurada. Edite o arquivo index.html.", "error"); return; }

  const solicitante  = document.getElementById("solicitante").value.trim();
  const email        = document.getElementById("email").value.trim();
  const setor        = document.getElementById("setor").value;
  const centroCusto  = document.getElementById("centroCusto").value;
  const ids          = Object.keys(itemsState).filter(id => document.getElementById("item-" + id));

  let ok = true;
  if (!solicitante)  { markErr("solicitante"); ok = false; }
  if (!email)        { markErr("email"); ok = false; }
  if (!setor)        { markErr("setor-display"); ok = false; }
  if (!centroCusto)  { markErr("cc-display"); ok = false; }
  if (!ok)           { showToast("Preencha todos os campos obrigatórios.", "error"); return; }
  if (!ids.length)   { showToast("Adicione pelo menos um item.", "error"); return; }

  const itens = [];
  for (const id of ids) {
    const desc     = document.getElementById("item-val-" + id)?.value.trim();
    const datanec  = document.getElementById("datanec-" + id)?.value;
    if (!desc)    { markErr("item-display-" + id); ok = false; }
    if (!datanec) { markErr("datanec-" + id); ok = false; }
    const qty   = parseFloat(document.getElementById("qty-" + id)?.value)   || 0;
    const price = parseFloat(document.getElementById("price-" + id)?.value) || 0;
    itens.push({
      numero:             parseInt(id),
      item:               desc || "",
      filial:             itemsState[id].filial || "MATRIZ",
      data_necessidade:   datanec || "",
      justificativa:      document.getElementById("justificativa-" + id)?.value.trim() || "",
      observacoes:        document.getElementById("obs-" + id)?.value.trim() || "",
      urgencia:           itemsState[id].urgency || "Normal",
      quantidade:         qty,
      valor_unitario:     price,
      total_item:         parseFloat((qty * price).toFixed(2)),
    });
  }
  if (!ok) { showToast("Preencha os campos obrigatórios de todos os itens.", "error"); return; }

  const { code, seq, year } = getNextCode();

  const payload = {
    codigo_solicitacao:  code,
    solicitante,
    email,
    setor,
    centro_custo:        centroCusto,
    total_geral:         parseFloat(itens.reduce((s, i) => s + i.total_item, 0).toFixed(2)),
    quantidade_itens:    itens.length,
    data_envio:          new Date().toISOString(),
    itens,
  };

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Enviando...";

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (res.ok || res.status === 200) {
      confirmCounter(seq, year);
      showToast("✓ Solicitação " + code + " enviada com sucesso!", "success");
      btn.textContent = "✓ Enviada — " + code;
      renderDocCode();
      setTimeout(() => { btn.disabled = false; btn.textContent = "Enviar Solicitação →"; }, 8000);
    } else throw new Error("HTTP " + res.status);
  } catch(e) {
    showToast("Erro ao enviar. Verifique o webhook.", "error");
    btn.disabled = false;
    btn.textContent = "Enviar Solicitação →";
  }
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + (type||"");
  setTimeout(() => t.className = "toast", 4500);
}

init();
</script>
