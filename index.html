<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Solicitação de Compra — PERPEC Oilfield Supply</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red2:#961c13;--dark:#1A1210;
  --bg:#F2F1ED;--surface:#FFFFFF;--surface2:#F8F7F5;
  --border:#E0DBD5;--border2:#C5BDB5;
  --text:#18171A;--muted:#6A6760;
  --accent:#C0392B;--accent-lt:#FDF0EF;
  --success:#155724;
  --radius:8px;--radius-lg:12px;
}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

.site-header{background:#fff;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.5rem}
.header-logo img{height:44px;width:auto;display:block}
.header-right{text-align:right}
.header-right .title{font-size:15px;font-weight:700;color:var(--dark)}
.header-right .sub{font-size:11px;color:var(--muted);margin-top:2px}

.doc-strip{background:var(--dark);padding:.55rem 1.5rem}
.doc-strip-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem}
.doc-code-label{font-size:11px;color:#A09090;letter-spacing:.05em;text-transform:uppercase;margin-right:6px}
.doc-code-val{font-family:"Courier New",monospace;font-size:14px;font-weight:700;color:#fff;letter-spacing:.1em}
.doc-meta{font-size:11px;color:#B0A0A0}
.doc-req{font-size:11px;color:#E09090}

.wrap{max-width:860px;margin:0 auto;padding:1.8rem 1rem 4rem}

/* Card sem overflow:hidden para os dropdowns aparecerem sobre o próximo card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.1rem;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative}
.card-head{background:var(--dark);padding:.65rem 1.3rem;display:flex;align-items:center;gap:8px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.card-head h2{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#D4C8C4}
.card-head svg{width:13px;height:13px;stroke:#C0392B;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.card-body{padding:1.25rem 1.3rem}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.full{grid-column:1/-1}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.full{grid-column:1}}

.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.req{color:var(--red);margin-left:1px}
.field input,.field textarea{border:1px solid var(--border2);border-radius:var(--radius);padding:9px 11px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);transition:border-color .14s,box-shadow .14s;width:100%}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.field input.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.field input[readonly]{background:var(--surface2);color:var(--muted);cursor:default;border-style:dashed;font-family:"Courier New",monospace;font-weight:700;font-size:13px;letter-spacing:.06em}
.field textarea{resize:vertical;min-height:72px}
.field input[type=number]{-moz-appearance:textfield}
.field input[type=number]::-webkit-outer-spin-button,.field input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── DROPDOWN ── */
.dd-wrap{position:relative}
.dd-btn{
  cursor:pointer;width:100%;display:block;text-align:left;
  background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:9px 30px 9px 11px;
  font-size:14px;font-family:inherit;color:var(--text);
  transition:border-color .14s,box-shadow .14s;
  position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.dd-btn:hover{border-color:#9A9087}
.dd-btn.open,.dd-btn:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.dd-btn.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.dd-btn .ph{color:#999;font-style:italic}
.dd-btn .cv{color:var(--text)}
.dd-caret{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:10px}
.dd-panel{
  position:absolute;top:calc(100% + 4px);left:0;
  min-width:100%;width:max-content;max-width:min(520px,90vw);
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius);box-shadow:0 8px 28px rgba(0,0,0,.18);
  max-height:300px;z-index:9999;display:none;flex-direction:column;
}
.dd-panel.open{display:flex}
.dd-search-box{padding:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.dd-search-box input{width:100%;border:1px solid var(--border2);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit}
.dd-search-box input:focus{outline:none;border-color:var(--red)}
.dd-list{overflow-y:auto;flex:1}
.dd-opt{padding:10px 14px;font-size:13.5px;cursor:pointer;line-height:1.4;transition:background .1s;white-space:normal;word-break:break-word}
.dd-opt:hover{background:var(--accent-lt);color:var(--red);font-weight:500}
.dd-none{padding:10px 14px;font-size:13px;color:var(--muted);font-style:italic}

/* ── ITEM CARD ── */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:10px;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.item-anim{animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.item-head{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.item-badge{font-size:10.5px;font-weight:700;letter-spacing:.06em;background:rgba(192,57,43,.2);color:#E08070;border-radius:20px;padding:3px 10px}
.btn-remove{width:26px;height:26px;border-radius:6px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9A8A85;font-size:18px;line-height:1;transition:background .13s,color .13s}
.btn-remove:hover{background:rgba(192,57,43,.2);color:var(--red)}
.item-body{padding:1.2rem 1.3rem;display:flex;flex-direction:column;gap:13px}
.um-other{display:none;margin-top:6px}
.um-other.show{display:block}

/* ── PILLS ── */
.pill-group{display:flex;gap:7px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .13s;user-select:none}
.pill.p-normal{background:#EEF2FF;border-color:#6B82CF;color:#3D5AC0}
.pill.p-alta{background:#FFFBEB;border-color:#D4A017;color:#92400E}
.pill.p-urgente{background:var(--accent-lt);border-color:var(--red);color:var(--red)}
.filial-pill{padding:6px 14px;border-radius:20px;font-size:12.5px;font-weight:500;border:1px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--muted);transition:all .13s;user-select:none}
.filial-pill.active{background:var(--dark);border-color:var(--dark);color:#fff}

.btn-add{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;border:1.5px dashed var(--border2);background:none;border-radius:var(--radius-lg);padding:12px;font-size:13.5px;font-family:inherit;cursor:pointer;color:var(--red);font-weight:600;transition:background .13s,border-color .13s;margin-bottom:1.3rem}
.btn-add:hover{background:var(--accent-lt);border-color:var(--red)}
.empty-state{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:13px;border:1.5px dashed var(--border2);border-radius:var(--radius-lg);margin-bottom:10px}
.btn-submit{width:100%;padding:14px;border:none;border-radius:var(--radius-lg);background:var(--red);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s}
.btn-submit:hover:not(:disabled){background:var(--red2)}
.btn-submit:active:not(:disabled){transform:scale(.99)}
.btn-submit:disabled{background:var(--border2);cursor:not-allowed;color:var(--muted)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;border-radius:var(--radius-lg);padding:12px 20px;font-size:13.5px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:99999;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--red)}
</style>
</head>

            <span id="ddlabel-setor" class="ph">Selecione ou pesquise o setor…</span>
            <span class="dd-caret">▼</span>
          </button>
          <input type="hidden" id="setor"/>
          <div class="dd-panel" id="ddp-setor">
            <div class="dd-search-box"><input type="text" placeholder="Pesquisar setor…" oninput="filterDD('setor',this.value)" onclick="event.stopPropagation()"/></div>
            <div class="dd-list" id="ddo-setor"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Centro de Custo <span class="req">*</span></label>
        <div class="dd-wrap">
          <button type="button" class="dd-btn" id="ddb-cc" onclick="toggleDD(event,'cc')">
            <span id="ddlabel-cc" class="ph">Selecione ou pesquise o centro de custo…</span>
            <span class="dd-caret">▼</span>
          </button>
          <input type="hidden" id="cc"/>
          <div class="dd-panel" id="ddp-cc">
            <div class="dd-search-box"><input type="text" placeholder="Pesquisar centro de custo…" oninput="filterDD('cc',this.value)" onclick="event.stopPropagation()"/></div>
            <div class="dd-list" id="ddo-cc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <h2>Itens Solicitados</h2>
    </div>
    <div class="card-body" style="padding-bottom:.8rem">
      <div id="itemsContainer">
        <div class="empty-state" id="emptyState">
          <div style="font-size:28px;margin-bottom:6px">📦</div>
          Nenhum item adicionado. Clique em "Adicionar item" abaixo.
        </div>
      </div>
      <button class="btn-add" onclick="addItem()">
        <span style="font-size:20px;line-height:1">+</span> Adicionar item
      </button>
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">Enviar Solicitação →</button>
    </div>
  </div>

</main>
<div class="toast" id="toast"></div>

<script>
const DD = {};
let appData = {
  setores:[],centros_custo:[],itens_catalogo:[],
  unidades:["UN — Unidade","PC — Peça","KG — Quilograma","G — Grama","T — Tonelada","L — Litro","ML — Mililitro","M — Metro","M² — Metro quadrado","M³ — Metro cúbico","CM — Centímetro","MM — Milímetro","CX — Caixa","PCT — Pacote","PAR — Par","ROLO — Rolo","BALDE — Balde","SC — Saco","FARDO — Fardo","JOGO — Jogo / Kit","OUTRO — Outra unidade"]
};
let itemCount=0, scCounter=0;
const itemsState={};

async function init(){
  setDocDate();
  try{ const r=await fetch(DADOS_URL+"?v="+Date.now()); if(r.ok) appData={...appData,...await r.json()}; }catch(e){}
  await loadCounter();
  renderCode();
  buildDD("setor", appData.setores);
  buildDD("cc",    appData.centros_custo);
}

function setDocDate(){
  const d=new Date();
  document.getElementById("dataSolicitacao").value=d.toLocaleDateString("pt-BR");
  document.getElementById("docDate").textContent=d.toLocaleDateString("pt-BR");
}
async function loadCounter(){
  const s=localStorage.getItem("perpec_sc_last");
  const ano=String(new Date().getFullYear()).slice(-2);
  if(s){const{seq,year}=JSON.parse(s); scCounter=String(year)===ano?seq:0;}
}
function renderCode(){
  const ano=String(new Date().getFullYear()).slice(-2);
  const n=scCounter+1;
  const code="SC-"+String(n).padStart(3,"0")+"-"+ano;
  document.getElementById("codigoSC").value=code;
  document.getElementById("docCodeDisplay").textContent=code;
}
function getNextCode(){
  const ano=String(new Date().getFullYear()).slice(-2);
  const n=scCounter+1;
  return{code:"SC-"+String(n).padStart(3,"0")+"-"+ano,seq:n,year:ano};
}
function confirmCounter(seq,year){localStorage.setItem("perpec_sc_last",JSON.stringify({seq,year}));scCounter=seq;}

// ── Dropdown ─────────────────────────────────────────────────────
function buildDD(id,items){ DD[id]=items; renderOpts(id,""); }

function renderOpts(id,q){
  const c=document.getElementById("ddo-"+id); if(!c) return;
  const list=q ? DD[id].filter(i=>i.toLowerCase().includes(q.toLowerCase())) : DD[id];
  c.innerHTML="";
  if(!list||!list.length){ c.innerHTML='<div class="dd-none">Nenhum resultado</div>'; return; }
  list.forEach(item=>{
    const d=document.createElement("div"); d.className="dd-opt"; d.textContent=item;
    d.addEventListener("click",e=>{ e.stopPropagation(); selectDD(id,item); });
    c.appendChild(d);
  });
}
function filterDD(id,q){ renderOpts(id,q); }

function toggleDD(event,id){
  event.stopPropagation(); // ESSENCIAL: evita que o click feche o painel imediatamente
  const panel=document.getElementById("ddp-"+id);
  const btn=document.getElementById("ddb-"+id);
  const wasOpen=panel.classList.contains("open");
  closeAllDD();
  if(!wasOpen){
    panel.classList.add("open"); btn.classList.add("open");
    const si=panel.querySelector("input[type=text]");
    if(si){ si.value=""; renderOpts(id,""); setTimeout(()=>si.focus(),30); }
  }
}
function selectDD(id,val){
  const h=document.getElementById(id); if(h) h.value=val;
  const l=document.getElementById("ddlabel-"+id); if(l){l.textContent=val;l.className="cv";}
  const b=document.getElementById("ddb-"+id); if(b) b.classList.remove("err");
  closeAllDD();
}
function closeAllDD(){
  document.querySelectorAll(".dd-panel").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll(".dd-btn").forEach(b=>b.classList.remove("open"));
}
document.addEventListener("click", closeAllDD);

function toggleItemDD(event,id,key){
  event.stopPropagation(); // ESSENCIAL
  const ddid="item-"+id+"-"+key;
  const panel=document.getElementById("ddp-"+ddid);
  const btn=document.getElementById("ddb-"+ddid);
  const wasOpen=panel.classList.contains("open");
  closeAllDD();
  if(!wasOpen){
    panel.classList.add("open"); btn.classList.add("open");
    const si=panel.querySelector("input[type=text]");
    if(si){ si.value=""; renderOpts(ddid,""); setTimeout(()=>si.focus(),30); }
  }
}
function selectItemDD(id,key,val){
  const h=document.getElementById(key+"-val-"+id); if(h) h.value=val;
  const l=document.getElementById("ddlabel-item-"+id+"-"+key); if(l){l.textContent=val;l.className="cv";}
  const b=document.getElementById("ddb-item-"+id+"-"+key); if(b) b.classList.remove("err");
  if(key==="um"){
    const o=document.getElementById("um-other-"+id);
    if(o) o.classList.toggle("show",val.startsWith("OUTRO"));
  }
  closeAllDD();
}

// ── Pills ─────────────────────────────────────────────────────────
function setFilial(id,val,el){
  itemsState[id].filial=val;
  document.querySelectorAll("#fg-"+id+" .filial-pill").forEach(p=>p.classList.toggle("active",p===el));
}
function setPriority(id,val,el){
  itemsState[id].urgency=val;
  document.querySelectorAll("#pp-"+id+" .pill").forEach(p=>{
    p.className="pill";
    if(p===el) p.classList.add(val==="Normal"?"p-normal":val==="Alta"?"p-alta":"p-urgente");
  });
}

// ── Items ─────────────────────────────────────────────────────────
function addItem(){
  itemCount++; const id=itemCount;
  itemsState[id]={filial:"MATRIZ",urgency:"Normal"};
  document.getElementById("emptyState")?.remove();
  const cid="item-"+id+"-cat", uid="item-"+id+"-um";
  const card=document.createElement("div");
  card.className="item-card item-anim"; card.id="item-"+id;
  card.innerHTML=`
    <div class="item-head">
      <span class="item-badge">ITEM #${id}</span>
      <button class="btn-remove" onclick="removeItem(${id})">×</button>
    </div>
    <div class="item-body">
      <div class="field">
        <label>Código + Descrição <span class="req">*</span></label>
        <div class="dd-wrap">
          <button type="button" class="dd-btn" id="ddb-${cid}" onclick="toggleItemDD(event,${id},'cat')">
            <span id="ddlabel-${cid}" class="ph">Selecione ou pesquise no catálogo…</span>
            <span class="dd-caret">▼</span>
          </button>
          <input type="hidden" id="cat-val-${id}"/>
          <div class="dd-panel" id="ddp-${cid}">
            <div class="dd-search-box"><input type="text" placeholder="Pesquisar item…" oninput="filterDD('${cid}',this.value)" onclick="event.stopPropagation()"/></div>
            <div class="dd-list" id="ddo-${cid}"></div>
          </div>
        </div>
      </div>
      <div class="g3">
        <div class="field">
          <label>Quantidade <span class="req">*</span></label>
          <input type="number" id="qty-${id}" placeholder="1" min="1"/>
        </div>
        <div class="field">
          <label>Unidade de medida <span class="req">*</span></label>
          <div class="dd-wrap">
            <button type="button" class="dd-btn" id="ddb-${uid}" onclick="toggleItemDD(event,${id},'um')">
              <span id="ddlabel-${uid}" class="ph">Selecione…</span>
              <span class="dd-caret">▼</span>
            </button>
            <input type="hidden" id="um-val-${id}"/>
            <div class="dd-panel" id="ddp-${uid}">
              <div class="dd-search-box"><input type="text" placeholder="Pesquisar…" oninput="filterDD('${uid}',this.value)" onclick="event.stopPropagation()"/></div>
              <div class="dd-list" id="ddo-${uid}"></div>
            </div>
          </div>
          <div class="um-other" id="um-other-${id}">
            <input type="text" id="um-outro-${id}" placeholder="Descreva a unidade…"/>
          </div>
        </div>
        <div class="field">
          <label>Data de necessidade <span class="req">*</span></label>
          <input type="date" id="datanec-${id}"/>
        </div>
      </div>
      <div class="field">
        <label>Filial <span class="req">*</span></label>
        <div class="pill-group" id="fg-${id}">
          <span class="filial-pill active" onclick="setFilial(${id},'MATRIZ',this)">MATRIZ</span>
          <span class="filial-pill" onclick="setFilial(${id},'SERVIÇO',this)">SERVIÇO</span>
          <span class="filial-pill" onclick="setFilial(${id},'REVENDA',this)">REVENDA</span>
          <span class="filial-pill" onclick="setFilial(${id},'LOCAÇÃO',this)">LOCAÇÃO</span>
        </div>
      </div>
      <div class="field">
        <label>Justificativa da compra</label>
        <input type="text" id="justificativa-${id}" placeholder="Por que este item é necessário?"/>
      </div>
      <div class="field">
        <label>Observações / Especificações</label>
        <input type="text" id="obs-${id}" placeholder="Marca, modelo, referência, link…"/>
      </div>
      <div class="field">
        <label>Urgência</label>
        <div class="pill-group" id="pp-${id}">
          <span class="pill p-normal" onclick="setPriority(${id},'Normal',this)">Normal</span>
          <span class="pill" onclick="setPriority(${id},'Alta',this)">Alta</span>
          <span class="pill" onclick="setPriority(${id},'Urgente',this)">Urgente</span>
        </div>
      </div>
    </div>`;
  document.getElementById("itemsContainer").appendChild(card);
  DD[cid]=appData.itens_catalogo; renderOpts(cid,"");
  DD[uid]=appData.unidades;       renderOpts(uid,"");
}

function removeItem(id){
  document.getElementById("item-"+id)?.remove();
  delete itemsState[id];
  if(!Object.keys(itemsState).length){
    const e=document.createElement("div"); e.className="empty-state"; e.id="emptyState";
    e.innerHTML='<div style="font-size:28px;margin-bottom:6px">📦</div>Nenhum item adicionado.';
    document.getElementById("itemsContainer").prepend(e);
  }
}

// ── Validation ────────────────────────────────────────────────────
function markErr(id){const el=document.getElementById(id);if(el){el.classList.add("err");el.addEventListener("input",()=>el.classList.remove("err"),{once:true});}}
function markBtnErr(id){const el=document.getElementById(id);if(el){el.classList.add("err");setTimeout(()=>el.classList.remove("err"),3000);}}

// ── Submit ────────────────────────────────────────────────────────
async function submitForm(){
  if(!WEBHOOK_URL){showToast("⚙️ URL do webhook não configurada.","error");return;}
  const solicitante=document.getElementById("solicitante").value.trim();
  const email=document.getElementById("email").value.trim();
  const setor=document.getElementById("setor").value;
  const cc=document.getElementById("cc").value;
  const ids=Object.keys(itemsState).filter(id=>document.getElementById("item-"+id));
  let ok=true;
  if(!solicitante){markErr("solicitante");ok=false;}
  if(!email){markErr("email");ok=false;}
  if(!setor){markBtnErr("ddb-setor");ok=false;}
  if(!cc){markBtnErr("ddb-cc");ok=false;}
  if(!ok){showToast("Preencha os campos obrigatórios destacados.","error");return;}
  if(!ids.length){showToast("Adicione pelo menos um item.","error");return;}
  const itens=[];
  for(const id of ids){
    const desc=document.getElementById("cat-val-"+id)?.value.trim();
    const qty=document.getElementById("qty-"+id)?.value.trim();
    const umVal=document.getElementById("um-val-"+id)?.value||"";
    const umOutro=document.getElementById("um-outro-"+id)?.value.trim()||"";
    const um=umVal.startsWith("OUTRO")?(umOutro||"OUTRO"):umVal;
    const datanec=document.getElementById("datanec-"+id)?.value;
    if(!desc){markBtnErr("ddb-item-"+id+"-cat");ok=false;}
    if(!qty){markErr("qty-"+id);ok=false;}
    if(!umVal){markBtnErr("ddb-item-"+id+"-um");ok=false;}
    if(!datanec){markErr("datanec-"+id);ok=false;}
    itens.push({
      numero:parseInt(id), item:desc||"", quantidade:parseFloat(qty)||0,
      unidade:um, filial:itemsState[id].filial||"MATRIZ",
      data_necessidade:datanec||"",
      justificativa:document.getElementById("justificativa-"+id)?.value.trim()||"",
      observacoes:document.getElementById("obs-"+id)?.value.trim()||"",
      urgencia:itemsState[id].urgency||"Normal"
    });
  }
  if(!ok){showToast("Preencha os campos obrigatórios de todos os itens.","error");return;}
  const{code,seq,year}=getNextCode();
  const payload={codigo_solicitacao:code,solicitante,email,setor,centro_custo:cc,quantidade_itens:itens.length,data_envio:new Date().toISOString(),itens};
  const btn=document.getElementById("submitBtn");
  btn.disabled=true; btn.textContent="Enviando…";
  try{
    const res=await fetch(WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(res.ok||res.status===200){
      confirmCounter(seq,year);
      showToast("✓ Solicitação "+code+" enviada!","success");
      btn.textContent="✓ Enviada — "+code;
      renderCode();
      setTimeout(()=>{btn.disabled=false;btn.textContent="Enviar Solicitação →";},7000);
    }else throw new Error("HTTP "+res.status);
  }catch(e){
    showToast("Erro ao enviar. Verifique o webhook.","error");
    btn.disabled=false; btn.textContent="Enviar Solicitação →";
  }
}

function showToast(msg,type){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show "+(type||"");
  setTimeout(()=>t.className="toast",4500);
}

init();
</script>
</body>
</html>
